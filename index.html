<html lang="ko">
<head>

<link rel="manifest" href="manifest.json">

<style>
:root {
  --felt:#150404;
  --velvet:#4a0e10;
  --velvet-deep:#290607;
  --gold:#d8b04a;
  --gold-bright:#f6e2a0;
  --ruby:#e2233f;
  --sapphire:#2454e6;
  --ivory:#f1e3c6;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background:
    radial-gradient(ellipse 900px 400px at 50% -8%, rgba(216,176,74,0.10), transparent 60%),
    radial-gradient(ellipse 900px 500px at 50% 115%, rgba(0,0,0,0.55), transparent 60%),
    var(--felt);
  min-height:100vh; padding:4px; display:flex; justify-content:center;
}

.board {
  width:100%; max-width:1020px;
  background:linear-gradient(180deg,var(--velvet),var(--velvet-deep));
  border-radius:8px;
  overflow:hidden; font-family:'Malgun Gothic','Dotum',Arial,sans-serif;
  position:relative;
  border:1px solid rgba(216,176,74,0.4);
  box-shadow:
    0 0 0 1px rgba(0,0,0,0.65),
    0 0 0 4px var(--velvet-deep),
    0 0 0 5px rgba(216,176,74,0.55),
    0 16px 40px rgba(0,0,0,0.65),
    inset 0 1px 0 rgba(255,255,255,0.05);
}

.marquee-lights {
  height:4px;
  background-image: repeating-radial-gradient(circle at 0 50%, var(--gold-bright) 0 1.4px, transparent 2px 14px);
  background-size: 28px 4px;
  filter: drop-shadow(0 0 3px rgba(246,226,160,0.65));
  animation: marquee-chase 1.3s linear infinite;
}
.marquee-lights.bottom { transform:scaleX(-1); }
@keyframes marquee-chase { from{background-position:0 0;} to{background-position:28px 0;} }
@media (prefers-reduced-motion: reduce) {
  .marquee-lights { animation:none; }
  .new-pop { animation:none !important; }
}

.sec-title {
  font-family:'Nanum Myeongjo',serif; font-weight:800;
  background:linear-gradient(180deg, rgba(0,0,0,0.22), rgba(0,0,0,0.04));
  color:var(--gold-bright); font-size:10px; letter-spacing:4px;
  text-align:center; padding:2px 0;
  border-bottom:1px solid rgba(216,176,74,0.25);
  text-shadow:0 0 10px rgba(246,226,160,0.35), 0 1px 0 rgba(0,0,0,0.6);
  user-select:none;
}

table.road { border-collapse:collapse; background:#faf6ef; }
table.road td { border:0.5px solid #ddd8cc; padding:0; text-align:center; vertical-align:middle; }

/* 육매: filled circles */
.bd { display:inline-flex; align-items:center; justify-content:center;
      width:18px; height:18px; border-radius:50%; font-size:8px; font-weight:bold; color:#fff; }
.bd-B { background:radial-gradient(circle at 32% 28%,#ff97a8,var(--ruby) 55%,#6e0017); border:1.5px solid var(--ruby); box-shadow:0 0 5px rgba(226,35,63,0.55); }
.bd-P { background:radial-gradient(circle at 32% 28%,#a6bbff,var(--sapphire) 55%,#0c1c66); border:1.5px solid var(--sapphire); box-shadow:0 0 5px rgba(36,84,230,0.55); }
.bd-T { background:radial-gradient(circle at 32% 28%,#9dffc0,#0fae54,#0a6630); border:1.5px solid #1fcf75; box-shadow:0 0 5px rgba(31,207,117,0.5); }

/* 빅로드: HOLLOW circles */
.br {
  display:inline-flex; align-items:center; justify-content:center;
  width:18px; height:18px; border-radius:50%; border:2px solid;
  box-sizing:border-box;
  background:radial-gradient(circle at 30% 25%, rgba(255,255,255,0.16), transparent 55%);
  position:relative;
}
.br-B { border-color:var(--ruby); box-shadow:0 0 4px rgba(226,35,63,0.55), inset 0 0 3px rgba(226,35,63,0.2); }
.br-P { border-color:var(--sapphire); box-shadow:0 0 4px rgba(36,84,230,0.55), inset 0 0 3px rgba(36,84,230,0.2); }
.tie-slash {
  position:absolute; width:130%; height:2px; background:#00cc44;
  left:-15%; top:50%; transform:translateY(-50%) rotate(-45deg); border-radius:2px;
}
.tie-num {
  position:absolute; bottom:-4px; right:-4px;
  background:#009933; color:#fff; font-size:6px; font-weight:bold;
  width:10px; height:10px; border-radius:50%;
  display:flex; align-items:center; justify-content:center; border:1px solid #00ff66;
}

/* 빅아이즈: hollow small circles */
.be { display:inline-block; width:9px; height:9px; border-radius:50%; border:1.5px solid; background:transparent; }
.be-R { border-color:var(--sapphire); box-shadow:0 0 2px rgba(36,84,230,0.5); }
.be-B { border-color:var(--ruby); box-shadow:0 0 2px rgba(226,35,63,0.5); }

/* 스몰: solid dots */
.sr { display:inline-block; width:7px; height:7px; border-radius:50%; }
.sr-R { background:var(--sapphire); box-shadow:0 0 2px rgba(36,84,230,0.5); }
.sr-B { background:var(--ruby); box-shadow:0 0 2px rgba(226,35,63,0.5); }

/* 코코로치: diagonal slash */
.cr-wrap { display:inline-block; width:11px; height:11px; position:relative; }
.cr-wrap::after { content:''; position:absolute; width:2px; height:14px; border-radius:2px; top:-1.5px; left:4.5px; transform:rotate(45deg); }
.cr-R::after { background:var(--sapphire); box-shadow:0 0 2px rgba(36,84,230,0.5); }
.cr-B::after { background:var(--ruby); box-shadow:0 0 2px rgba(226,35,63,0.5); }

/* 3매: filled circles B/P */
.s3 { display:inline-flex; align-items:center; justify-content:center;
      width:17px; height:17px; border-radius:50%; font-size:8px; font-weight:bold; color:#fff; }
.s3-B { background:radial-gradient(circle at 32% 28%,#ff97a8,var(--ruby)); border:1.5px solid var(--ruby); box-shadow:0 0 4px rgba(226,35,63,0.5); }
.s3-P { background:radial-gradient(circle at 32% 28%,#a6bbff,var(--sapphire)); border:1.5px solid var(--sapphire); box-shadow:0 0 4px rgba(36,84,230,0.5); }

/* Layout */
.row1 { display:flex; border-bottom:2px solid rgba(216,176,74,0.25); }
.col-bead { flex-shrink:0; overflow-x:auto; background:#faf6ef; border-right:2px solid rgba(216,176,74,0.25); }
.col-stats { flex:1; background:#1a0505; padding:4px 8px; display:flex; flex-direction:column; justify-content:center; }

.stats-grid { display:flex; justify-content:space-around; align-items:center; margin-top:2px; }
.stat-item { text-align:center; }
.stat-lbl { font-size:8px; color:#a08860; letter-spacing:1px; }

.stat-pct { font-size:8px; color:#6b5a44; }
.cB{color:var(--ruby);} .cP{color:var(--sapphire);} .cT{color:#3ecf83;} .cX{color:var(--gold-bright);}

.next-wrap { margin-top:4px; text-align:center; }

.nb-B { border:2px solid var(--ruby); color:var(--ruby); }
.nb-P { border:2px solid var(--sapphire); color:var(--sapphire); }

/* 3단 분할 — 패턴분석 좁게, 우세 넓게 */

.stats-third-m { flex:0 0 35%; padding:0 8px; border-right:1px solid rgba(216,176,74,0.18); }

/* 패턴분석 */

.pp-lbl { color:#a08860; letter-spacing:0.5px; white-space:nowrap; }

/* 우세 패널 */

.sup-icon-cell { text-align:center !important; }
.sup-dash { font-size:11px; color:#3a2a18; }

.row2 { border-bottom:2px solid rgba(216,176,74,0.25); overflow-x:auto; background:#faf6ef; }
.row3 { display:flex; border-bottom:1px solid rgba(216,176,74,0.25); }
.col-be { flex:1; overflow-x:auto; border-right:1px solid rgba(216,176,74,0.25); background:#faf6ef; }
.col-sr { flex:1; overflow-x:auto; background:#faf6ef; }
.row4 { display:flex; border-bottom:2px solid rgba(216,176,74,0.25); }
.col-cr { flex:1; overflow-x:auto; border-right:1px solid rgba(216,176,74,0.25); background:#faf6ef; }

.status-bar { background:#100404; padding:3px 12px; font-size:10px; color:#886644; text-align:center; border-bottom:1px solid rgba(216,176,74,0.25); min-height:20px; letter-spacing:1px; }

.controls { padding:6px 8px; background:#1a0505; display:flex; gap:6px; justify-content:center; flex-wrap:wrap; }
.btn {

.btn:active { transform:scale(0.95) translateY(0); filter:brightness(0.88); }
.btn-B { background:linear-gradient(175deg,#ff5570,var(--ruby) 50%,#7a0019); border-color:rgba(255,255,255,0.25); color:#fff; box-shadow:0 3px 10px rgba(226,35,63,0.45), inset 0 1px 0 rgba(255,255,255,0.25); }
.btn-P { background:linear-gradient(175deg,#6a8aff,var(--sapphire) 50%,#0a1a66); border-color:rgba(255,255,255,0.25); color:#fff; box-shadow:0 3px 10px rgba(36,84,230,0.45), inset 0 1px 0 rgba(255,255,255,0.25); }
.btn-T { background:linear-gradient(175deg,#2bb573,#0a4a2c); border-color:rgba(255,255,255,0.2); color:#d6fbe6; box-shadow:0 3px 10px rgba(20,150,90,0.35), inset 0 1px 0 rgba(255,255,255,0.2); }
.btn-undo { background:linear-gradient(175deg,#c79a3a,#5a4310); border-color:rgba(255,255,255,0.18); color:#fff3d0; box-shadow:0 3px 10px rgba(170,130,30,0.3), inset 0 1px 0 rgba(255,255,255,0.15); }
.btn-reset { background:linear-gradient(175deg,#33334a,#14141f); border-color:rgba(255,255,255,0.12); color:#c2c2e0; box-shadow:0 3px 10px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.08); }

<!-- ===================== 실제 전광판 (비번 통과해야 보임) ===================== -->
<div id="content">
<div class="board">

  <div class="row1">
    <div class="col-bead">
      <div class="sec-title">◆ 육 매 ( B E A D  R O A D ) ◆</div>

    </div>
    <div class="col-stats">
      <div class="stats-split">
        <div class="stats-third stats-third-l">
          <div class="sec-title">◆ 총 국 결 과 ◆</div>
          <div class="stats-grid">
            <div class="stat-item"><div class="stat-lbl">총 게 임</div><div class="stat-val cX" id="sTotal">0</div><div class="stat-pct">TOTAL</div></div>
            <div class="stat-item"><div class="stat-lbl">뱅 커</div><div class="stat-val cB" id="sB">0</div><div class="stat-pct" id="sBp">—</div></div>

          </div>

            <div class="next-lbl">N E X T</div>

          </div>
        </div>

          <div class="sec-title">◆ 패 턴 분 석 ◆</div>

        </div>

  </div>

<script>
'use strict';

/* ── Constants ──────────────────────────────── */
const BIG_ROWS=6, BIG_MINCOL=24;
const OK_ROWS=6,  OK_MINCOL=10;
const DER_ROWS=6, DER_MINCOL=16;
const SAM_ROWS=3, SAM_MINCOL=16;

let results = [];

/* ═══════════════════════════════════════════════
   빅 로드 (Big Road) — 스테어케이스 드래곤 포함
   ▸ 6행 기준
   ▸ 같은 색 7개+: 6행 끝에서 오른쪽(드래곤)
   ▸ 다음 색 column: 드래곤 연속되면 maxRow 1씩 감소
     (예: 1열=6행→드래곤, 2열=5행→드래곤, 3열=4행→드래곤)
   ▸ 정상 종료(드래곤 없음) 후: maxRow 리셋
   ═══════════════════════════════════════════════ */
function computeBigRoad(res) {
  /*
   * 빅로드 — 드래곤 후 다음 색은 "드래곤 첫 번째 열"에서 row=0 시작
   * 예) B×8: col0(행0~5) + 드래곤 col1,col2(행5)
   *     다음 P: col1(행0~4) 시작 → 빈 열 없음
   */
  const entries = [];
  let lastNT = null;
  let col = -1, row = 0;
  let maxRow = BIG_ROWS - 1;
  let inDragon = false;
  let firstDragonCol = -1;   // 드래곤이 시작된 첫 번째 열

  for (const r of res) {
    if (r === 'T') {
      if (entries.length) entries[entries.length-1].ties++;
      continue;
    }

    if (col === -1) {
      col = 0; row = 0; inDragon = false; firstDragonCol = -1;
    } else if (r === lastNT) {
      if (row < maxRow) {
        row++;
      } else {
        // 드래곤: 오른쪽으로 이동
        col++;
        if (!inDragon) { firstDragonCol = col; inDragon = true; }
      }
    } else {
      // 색 변경
      if (inDragon) {
        // ★ 다음 색은 드래곤 첫 번째 열(firstDragonCol)에서 row=0 시작
        col    = firstDragonCol;
        row    = 0;
        maxRow = Math.max(0, maxRow - 1);
      } else {
        col++; row = 0;
        maxRow = BIG_ROWS - 1;
      }
      inDragon = false; firstDragonCol = -1;
    }

    entries.push({ col, row, result: r, ties: 0 });
    lastNT = r;
  }
  return entries;
}

/* ═══════════════════════════════════════════════
   파생로드 엔진 — Microgaming 공식 로드맵 매뉴얼 기준
   (출처: Microgaming Live Games 기술 문서, livedealer.org 공개)
   ▸ Big Eye Road  (빅아이즈로드): k = 1
   ▸ Small Road    (스몰로드):    k = 2
   ▸ Cockroach Rd  (코코로치로드): k = 3

   빅로드의 마지막 아이콘이 "컬럼 n, 행 m" (1-indexed)에 있다고 할 때:

   [m >= 2 : 같은 컬럼에서 아래로 이어지는 경우]
     비교 대상 = 컬럼 (n - k). 그 컬럼에 아이콘이 p개 있다면:
       m <= p     → RED
       m == p + 1 → BLUE
       m  > p + 1 → RED   ★ 기존 코드가 빠뜨렸던 케이스.
                            "셀이 존재하는가"만 boolean으로 체크하면
                            이 구간(많이 짧은 참조컬럼)이 전부 BLUE로
                            잘못 계산됨 — 이게 스몰/코코로치/빅아이즈가
                            실제 카지노 엔진과 어긋난 진짜 원인이었음.

   [m == 1 : 새 컬럼이 시작되는 경우]
     결과색을 반전했다고 가정하고(뱅커↔플레이어), m'=이전 컬럼 길이+1,
     n'=n-1 로 두어 위 m>=2 규칙을 그대로 적용한 뒤, 답을 다시 반전.
     (정리하면 결국: 직전 컬럼 길이 == (k만큼 더 전) 컬럼 길이 → RED,
      다르면 BLUE — 이 부분은 기존 구현이 이미 정확했음)
   ═══════════════════════════════════════════════ */
function computeDerived(bigRoad, k) {
  // 빅로드를 컬럼별로 그룹화 (1-indexed 컬럼/행 번호 사용)
  const colLen = {};                       // colLen[n] = 컬럼 n의 아이콘 개수
  for (const e of bigRoad) {
    const n = e.col + 1;
    colLen[n] = (colLen[n] || 0) + 1;
  }

  const out = [];

  for (const e of bigRoad) {
    const n = e.col + 1;
    const m = e.row + 1;
    let isRed;

    if (m >= 2) {
      const refCol = n - k;
      if (refCol < 1) continue;
      const p = colLen[refCol] || 0;
      if (m <= p)        isRed = true;
      else if (m === p+1) isRed = false;
      else                 isRed = true;     // m > p+1
    } else {
      // m === 1 (새 컬럼)
      const nPrime = n - 1;
      const refCol = nPrime - k;
      if (refCol < 1) continue;
      const mPrime = (colLen[nPrime] || 0) + 1;
      const p = colLen[refCol] || 0;
      let red;
      if (mPrime <= p)        red = true;
      else if (mPrime === p+1) red = false;
      else                      red = true;
      isRed = !red;   // 반전된 답을 다시 반전
    }

    out.push(isRed ? 'R' : 'B');
  }
  return out;
}

/* ═══════════════════════════════════════════════
   파생로드 시각 배치 — 스테어케이스 드래곤 동일 적용
   (빅아이즈, 스몰, 코코로치 모두 동일 방식)
   ═══════════════════════════════════════════════ */
function buildDerivedDisplay(arr, rows) {
  // 파생로드도 동일: 드래곤 후 다음 색은 드래곤 첫 열에서 시작
  const entries = [];
  let lastColor = null;
  let col = -1, row = 0;
  let maxRow = rows - 1;
  let inDragon = false;
  let firstDragonCol = -1;

  for (const color of arr) {
    if (col === -1) {
      col = 0; row = 0; inDragon = false; firstDragonCol = -1;
    } else if (color === lastColor) {
      if (row < maxRow) {
        row++;
      } else {
        col++;
        if (!inDragon) { firstDragonCol = col; inDragon = true; }
      }
    } else {
      if (inDragon) {
        col    = firstDragonCol;
        row    = 0;
        maxRow = Math.max(0, maxRow - 1);
      } else {
        col++; row = 0;
        maxRow = rows - 1;
      }
      inDragon = false; firstDragonCol = -1;
    }
    entries.push({ col, row, color });
    lastColor = color;
  }
  return entries;
}

/* 3매: 타이 제외 B/P 순서대로 3행씩 */
function computeSamMae(res) {
  const nt = res.filter(r => r !== 'T');
  return nt.map((r, i) => ({ col: Math.floor(i/SAM_ROWS), row: i%SAM_ROWS, result: r }));
}

/* ── Grid helpers ───────────────────────────── */
function entriesToGrid(entries, rows, cols) {
  const g = Array.from({length:rows}, () => Array(cols).fill(null));
  for (const e of entries)
    if (e.row < rows && e.col < cols) g[e.row][e.col] = e;
  return g;
}
function flatToGrid(arr, rows, cols) {
  const g = Array.from({length:rows}, () => Array(cols).fill(null));
  for (let i=0; i<arr.length; i++) {
    const c=Math.floor(i/rows), r=i%rows;
    if (c<cols) g[r][c]=arr[i];
  }
  return g;
}

/* ── Renderers ──────────────────────────────── */

function renderBead(res) {
  const cols=Math.max(OK_MINCOL, Math.ceil(res.length/OK_ROWS)+2);
  const g=flatToGrid(res,OK_ROWS,cols);
  let h=`<table class="road">`;
  for (let r=0;r<OK_ROWS;r++) {
    h+=`<tr>`;
    for (let c=0;c<cols;c++) {
      h+=`<td style="width:34px;height:34px;">`;
      const v=g[r][c]; if(v) h+=`<span class="bd bd-${v}">${v}</span>`;
      h+=`</td>`;
    }
    h+=`</tr>`;
  }
  h+=`</table>`;
  document.getElementById('beadRoad').innerHTML=h;
}

function renderBigRoad(entries) {
  const maxC=entries.reduce((m,e)=>Math.max(m,e.col),-1);
  const cols=Math.max(BIG_MINCOL, maxC+4);
  const g=entriesToGrid(entries,BIG_ROWS,cols);
  const last=entries[entries.length-1];
  const CW=42,CH=42;
  let h=`<table class="road">`;
  for (let r=0;r<BIG_ROWS;r++) {
    h+=`<tr>`;
    for (let c=0;c<cols;c++) {
      h+=`<td style="width:${CW}px;height:${CH}px;">`;
      const e=g[r][c];
      if (e) {
        const pop=(e===last)?' new-pop':'';
        let inner='';
        if (e.ties>0) {
          inner+=`<span class="tie-slash"></span>`;
          if (e.ties>=2) inner+=`<span class="tie-num">${e.ties}</span>`;
        }
        h+=`<span class="br br-${e.result}${pop}">${inner}</span>`;
      }
      h+=`</td>`;
    }
    h+=`</tr>`;
  }
  h+=`</table>`;
  document.getElementById('bigRoad').innerHTML=h;
}

/* 빅아이즈/스몰/코코로치 공통 렌더 (표시 요소만 다름) */
function renderDerivedGrid(id, displayEntries, rows, minCols, cellSize, cellFn) {
  const maxC=displayEntries.reduce((m,e)=>Math.max(m,e.col),-1);
  const cols=Math.max(minCols, maxC+4);
  const g=Array.from({length:rows},()=>Array(cols).fill(null));
  for (const e of displayEntries) if(e.col<cols) g[e.row][e.col]=e;
  let h=`<table class="road">`;
  for (let r=0;r<rows;r++) {
    h+=`<tr>`;
    for (let c=0;c<cols;c++) {
      h+=`<td style="width:${cellSize}px;height:${cellSize}px;">`;
      const e=g[r][c]; if(e) h+=cellFn(e.color);
      h+=`</td>`;
    }
    h+=`</tr>`;
  }
  h+=`</table>`;
  document.getElementById(id).innerHTML=h;
}

function renderSamMae(entries) {
  const maxC=entries.length>0?entries[entries.length-1].col:-1;
  const cols=Math.max(SAM_MINCOL,maxC+4);
  const last=entries[entries.length-1];
  const g=Array.from({length:SAM_ROWS},()=>Array(cols).fill(null));
  for (const e of entries) if(e.col<cols) g[e.row][e.col]=e;
  let h=`<table class="road">`;
  for (let r=0;r<SAM_ROWS;r++) {
    h+=`<tr>`;
    for (let c=0;c<cols;c++) {
      h+=`<td style="width:28px;height:28px;">`;
      const e=g[r][c];
      if(e) h+=`<span class="s3 s3-${e.result}${e===last?' new-pop':''}">${e.result}</span>`;
      h+=`</td>`;
    }
    h+=`</tr>`;
  }
  h+=`</table>`;
  document.getElementById('samMae').innerHTML=h;
}

function renderStats(res) {
  const s={B:0,P:0,T:0};
  for(const r of res) s[r]++;
  const total=res.length;
  document.getElementById('sTotal').textContent=total;
  document.getElementById('sB').textContent=s.B;
  document.getElementById('sP').textContent=s.P;
  document.getElementById('sT').textContent=s.T;
  if(total>0){
    document.getElementById('sBp').textContent=(s.B/total*100).toFixed(1)+'%';
    document.getElementById('sPp').textContent=(s.P/total*100).toFixed(1)+'%';
    document.getElementById('sTp').textContent=(s.T/total*100).toFixed(1)+'%';
  } else { ['sBp','sPp','sTp'].forEach(id=>document.getElementById(id).textContent='—'); }
}

function renderStatus(res) {
  const bar=document.getElementById('statusBar');
  if(!res.length){bar.innerHTML='▶ 버튼을 눌러 결과를 입력하세요';return;}
  const s={B:0,P:0,T:0}; for(const r of res) s[r]++;
  const last=res[res.length-1];
  const nm={B:'뱅 커',P:'플레이어',T:'타 이'};
  const cc={B:'#ff4444',P:'#4488ff',T:'#44cc66'};
  bar.innerHTML=`제 <b style="color:#ffcc00">${res.length}</b>국 &nbsp;|&nbsp; 결과: <b style="color:${cc[last]}">${nm[last]}</b> &nbsp;|&nbsp; B <b class="cB">${s.B}</b> &nbsp; P <b class="cP">${s.P}</b> &nbsp; T <b class="cT">${s.T}</b>`;
}

/* ═══════════════════════════════════════════════
   패턴 분석 패널
   ▸ 미래 결과를 추정/추천하지 않음.
   ▸ 지금까지 형성된 모양(줄 길이, 이어짐/끊김 비율,
     교대 빈도)만 그대로 수치화해서 보여주는 현황판.
   ═══════════════════════════════════════════════ */
function renderPatternPanel(bigRoad, bigEyeArr, smallArr, cockArr) {
  const el = document.getElementById('patternPanel');
  if (!bigRoad.length) {
    el.innerHTML = `<div class="pp-note" style="margin-top:10px;">데이터 없음</div>`;
    return;
  }

  // 현재 진행 중인 컬럼(줄) 길이
  const lastCol = bigRoad[bigRoad.length-1].col;
  const curStreak = bigRoad.filter(e => e.col === lastCol).length;

  // 파생로드 이어짐(R)/끊김(B) 비율
  function ratio(arr) {
    if (!arr.length) return null;
    const r = arr.filter(x => x === 'R').length;
    return { r: r/arr.length*100, b: 100-(r/arr.length*100), n: arr.length };
  }
  const be = ratio(bigEyeArr), sm = ratio(smallArr), co = ratio(cockArr);
  const fmtPct = o => o ? `이어짐${o.r.toFixed(0)}%·끊김${o.b.toFixed(0)}%` : '—';

  // 최근 10국 교대율(핑퐁 빈도) — 타이 제외
  const nt = results.filter(r => r !== 'T');
  const last10 = nt.slice(-10);
  let alt = 0;
  for (let i=1;i<last10.length;i++) if (last10[i] !== last10[i-1]) alt++;
  const altRatio = last10.length > 1 ? alt/(last10.length-1)*100 : null;

  // 상태 라벨
  let stateLabel = '데이터 누적 중';
  if (co && co.n >= 4) {
    if (co.b >= 65) stateLabel = '끊김 우세 구간';
    else if (co.r >= 65) stateLabel = '이어짐 우세 구간';
    else stateLabel = '혼조 구간';
  }

  el.innerHTML = `
    <div class="pp-row"><span class="pp-lbl">현재 줄 길이</span><span class="pp-val">${bigRoad[bigRoad.length-1] ? bigRoad.filter(e=>e.col===bigRoad[bigRoad.length-1].col).length : 0}</span></div>
    <div class="pp-row"><span class="pp-lbl">빅아이즈</span><span class="pp-val">${fmtPct(be)}</span></div>
    <div class="pp-row"><span class="pp-lbl">스 몰</span><span class="pp-val">${fmtPct(sm)}</span></div>
    <div class="pp-row"><span class="pp-lbl">코코로치</span><span class="pp-val">${fmtPct(co)}</span></div>
    <div class="pp-row"><span class="pp-lbl">최근10국 교대율</span><span class="pp-val">${altRatio!==null?altRatio.toFixed(0)+'%':'—'}</span></div>
    <div class="pp-state">${stateLabel}</div>
    <div class="pp-note">※ 지금까지 나온 모양의 통계 요약입니다.</div>
  `;

  // 우세 패널 렌더
  renderSupPanel(be, sm, co, nt[nt.length-1]);
}

/* ── 우세 패널 ──────────────────────────────────────
   이어짐/끊김 10%p 이상 차이날 때만 B/P 아이콘 표시
   이어짐 우세 → 현재 마지막 결과(줄 연속) 표시
   끊김 우세   → 현재 마지막 결과의 반대(줄 전환) 표시
   ──────────────────────────────────────────────── */
function renderSupPanel(be, sm, co, lastNT) {
  const el = document.getElementById('supPanel');
  if (!el) return;

  const THRESHOLD = 10;
  const opp = r => r === 'B' ? 'P' : 'B';
  const lbl = r => r === 'B' ? '뱅' : '플';

  function iconHtml(ratio) {
    if (!ratio || !lastNT) return `<span class="sup-dash">—</span>`;
    const diff = ratio.r - ratio.b;  // + = 이어짐 우세, - = 끊김 우세
    if (Math.abs(diff) < THRESHOLD) return `<span class="sup-dash">—</span>`;
    const result = diff > 0 ? lastNT : opp(lastNT);
    const cls = result === 'B' ? 's3-B' : 's3-P';
    return `<div class="s3 ${cls}">${lbl(result)}</div>`;
  }

  el.innerHTML = `
    <table class="sup-table">
      <tr>
        <td class="sup-road-lbl">빅아이즈</td>
        <td class="sup-icon-cell">${iconHtml(be)}</td>
      </tr>
      <tr>
        <td class="sup-road-lbl">스 몰</td>
        <td class="sup-icon-cell">${iconHtml(sm)}</td>
      </tr>
      <tr>
        <td class="sup-road-lbl">코코로치</td>
        <td class="sup-icon-cell">${iconHtml(co)}</td>
      </tr>
    </table>
  `;
}

/* ── Main update ────────────────────────────── */
function update() {
  const bigRoad = computeBigRoad(results);
  // 빅아이즈로드만 색 반전 (실측 결과 정반대로 나와서 호출부에서만 뒤집음 — 다른 로드는 손대지 않음)
  const bigEyeArr  = computeDerived(bigRoad, 1).map(v => v === 'R' ? 'B' : 'R');
  const smallArr   = computeDerived(bigRoad, 2).map(v => v === 'R' ? 'B' : 'R');
  const cockArr    = computeDerived(bigRoad, 3).map(v => v === 'R' ? 'B' : 'R');
  const samMae  = computeSamMae(results);

  const bigEyeDisp = buildDerivedDisplay(bigEyeArr, DER_ROWS);
  const smallDisp  = buildDerivedDisplay(smallArr,  DER_ROWS);
  const cockDisp   = buildDerivedDisplay(cockArr,   DER_ROWS);

  renderBead(results);
  renderBigRoad(bigRoad);

  // 빅아이즈로드: hollow circles
  renderDerivedGrid('bigEye', bigEyeDisp, DER_ROWS, DER_MINCOL, 18,
    c=>`<span class="be be-${c}"></span>`);

  // 스몰로드: solid dots
  renderDerivedGrid('smallRoad', smallDisp, DER_ROWS, DER_MINCOL, 14,
    c=>`<span class="sr sr-${c}"></span>`);

  // 코코로치로드: diagonal slashes
  renderDerivedGrid('cockroach', cockDisp, DER_ROWS, DER_MINCOL, 20,
    c=>`<span class="cr-wrap cr-${c}"></span>`);

  renderSamMae(samMae);
  renderStats(results);
  renderStatus(results);
  renderPatternPanel(bigRoad, bigEyeArr, smallArr, cockArr);
}

/* ── Controls ───────────────────────────────── */
function addResult(r) { results.push(r); update(); }
function undoLast()   { if(results.length){results.pop();update();} }
function resetAll()   { if(results.length&&confirm('모든 기록을 초기화하시겠습니까?')){results=[];update();} }

update();
</script>

<script>
/* ===================== 사용 만료일 설정 =====================
   아래 날짜가 지나면 비밀번호를 맞게 입력해도 더 이상 들어갈 수 없습니다.
   날짜만 원하는 값으로 바꾸세요. 형식: "YYYY-MM-DD"
*/
const EXPIRY_DATE = "2026-06-25";

function isExpired() {
  const today = new Date();
  const expiry = new Date(EXPIRY_DATE + "T23:59:59");
  return today > expiry;
}

function showExpiredScreen() {
  document.getElementById("loginScreen").innerHTML =
    '<h2>⛔ 사용 기간이 종료되었습니다</h2><p style="margin-top:10px;opacity:0.8;">관리자에게 문의해주세요.</p>';
}

/* ===================== 로그인 검증 =====================
   비밀번호는 아래 한 줄에 있습니다. "1234" 부분만 바꾸면 됩니다.
*/
const PASSWORD = "thswldn";

function checkPassword() {
  if (isExpired()) { showExpiredScreen(); return; }
  const pw = document.getElementById("pwInput").value;
  if (pw === PASSWORD) {
    document.getElementById("loginScreen").style.display = "none";
    document.getElementById("content").style.display = "block";
    sessionStorage.setItem("loggedIn", "1");
  } else {
    document.getElementById("errorMsg").textContent = "비밀번호가 틀렸습니다.";
    document.getElementById("pwInput").value = "";
  }
}

document.getElementById("pwInput").addEventListener("keydown", e => {
  if (e.key === "Enter") checkPassword();
});

window.addEventListener("DOMContentLoaded", () => {
  if (isExpired()) {
    showExpiredScreen();
    document.getElementById("content").style.display = "none";
    return;
  }
  if (sessionStorage.getItem("loggedIn") === "1") {
    document.getElementById("loginScreen").style.display = "none";
    document.getElementById("content").style.display = "block";
  }
});

/* ===================== 코드 복사 방해 장치 (완벽 차단은 아님) ===================== */
document.addEventListener("contextmenu", e => e.preventDefault());
document.addEventListener("selectstart", e => e.preventDefault());
document.addEventListener("keydown", e => {
  const blocked =
    e.key === "F12" ||
    (e.ctrlKey && e.key.toUpperCase() === "U") ||
    (e.ctrlKey && e.key.toUpperCase() === "S") ||
    (e.ctrlKey && e.shiftKey && ["I","J","C"].includes(e.key.toUpperCase()));
  if (blocked) e.preventDefault();
});

/* ===================== PWA 서비스워커 등록 ===================== */
if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("sw.js").catch(() => {});
  });
}
</script>
